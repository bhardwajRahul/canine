apiVersion: apps/v1
kind: Deployment
metadata:
  name: <%= service.name %>
  namespace: <%= project.namespace %>
  labels:
    caninemanaged: 'true'
    app: <%= service.name %>
spec:
  replicas: <%= service.replicas %>
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: <%= service.name %>
  template:
    metadata:
      annotations:
        rolloutTimestamp: "<%= Time.current.to_i %>"
      labels:
        app: <%= service.name %>
    spec:
      securityContext:
        fsGroup: 1001
      <% if service.pod_yaml.present? %>
<%= service.pod_yaml.to_yaml_raw.to_s.lines.map { |line| "      #{line}" }.join %>
      <% end %>
      <% if project.development_environment? %>
      <% development_environment_configuration = project.child_development_environment.parent_project.development_environment_configuration %>
      initContainers:
      - name: user-setup
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            chgrp -R 1001 <%= development_environment_configuration.workspace_mount_path %> || true
            chmod -R g+rwX <%= development_environment_configuration.workspace_mount_path %> || true
            chmod g+s <%= development_environment_configuration.workspace_mount_path %> || true
            chgrp -R 1001 /home/rover || true
            chmod -R g+rwX /home/rover || true
            chmod g+s /home/rover || true
        <% if @project.volumes.present? %>
        volumeMounts:
        <% @project.volumes.each do |volume| %>
        - name: <%= volume.name %>
          mountPath: <%= volume.mount_path %>
        <% end %>
        <% end %>
      - name: git-clone
        image: ghcr.io/caninehq/rover:latest
        imagePullPolicy: Always
        command: ["/usr/local/bin/rover-entrypoint", "/bin/true"]
        envFrom:
        - configMapRef:
            name: <%= project.name %>
        - secretRef:
            name: <%= project.name %>
        <% if @project.volumes.present? %>
        volumeMounts:
        <% @project.volumes.each do |volume| %>
        - name: <%= volume.name %>
          mountPath: <%= volume.mount_path %>
        <% end %>
        <% end %>
      - name: rover
        image: ghcr.io/caninehq/rover:latest
        imagePullPolicy: Always
        restartPolicy: Always
        env:
        - name: WORKSPACE_DIR
          value: "<%= development_environment_configuration.workspace_mount_path %>"

        envFrom:
        - configMapRef:
            name: <%= project.name %>
        - secretRef:
            name: <%= project.name %>
        <% if @project.volumes.present? %>
        volumeMounts:
        <% @project.volumes.each do |volume| %>
        - name: <%= volume.name %>
          mountPath: <%= volume.mount_path %>
        <% end %>
        <% end %>
      <% end %>
      containers:
      - name: <%= project.name %>
        image: <%= project.container_image_reference_with_digest %>
        imagePullPolicy: IfNotPresent
        <% if service.command.present? %>
        command: <%= service.command.split.to_json %>
        <% end %>
        envFrom:
        - configMapRef:
            name: <%= project.name %>
        - secretRef:
            name: <%= project.name %>
        <% if service.web_service? %>
        ports:
        - containerPort: <%= service.container_port %>
        <% end %>
        <% if service.healthcheck_url.present? %>
        livenessProbe:
          httpGet:
            path: <%= service.healthcheck_url %>
            port: <%= service.container_port %>
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: <%= service.healthcheck_url %>
            port: <%= service.container_port %>
          initialDelaySeconds: 30
          periodSeconds: 10
        <% end %>
        <% if @project.volumes.present? %>
        volumeMounts:
        <% @project.volumes.each do |volume| %>
        - name: <%= volume.name %>
          mountPath: <%= volume.mount_path %>
        <% end %>
        <% end %>
        <% resource_constraint = service.resource_constraint %>
        <% if resource_constraint.present? %>
        resources:
          <% if resource_constraint.cpu_request.present? || resource_constraint.memory_request.present? || resource_constraint.gpu_request.present? %>
          requests:
            <% if resource_constraint.cpu_request.present? %>
            cpu: "<%= resource_constraint.cpu_request_formatted %>"
            <% end %>
            <% if resource_constraint.memory_request.present? %>
            memory: "<%= resource_constraint.memory_request_formatted %>"
            <% end %>
            <% if resource_constraint.gpu_request.present? && resource_constraint.gpu_request > 0 %>
            nvidia.com/gpu: <%= resource_constraint.gpu_request %>
            <% end %>
          <% end %>
          <% if resource_constraint.cpu_limit.present? || resource_constraint.memory_limit.present? %>
          limits:
            <% if resource_constraint.cpu_limit.present? %>
            cpu: "<%= resource_constraint.cpu_limit_formatted %>"
            <% end %>
            <% if resource_constraint.memory_limit.present? %>
            memory: "<%= resource_constraint.memory_limit_formatted %>"
            <% end %>
            <% if resource_constraint.gpu_request.present? && resource_constraint.gpu_request > 0 %>
            nvidia.com/gpu: <%= resource_constraint.gpu_request %>
            <% end %>
          <% end %>
        <% end %>
      imagePullSecrets:
      - name: dockerconfigjson-github-com
      <% if @project.volumes.present? %>
      volumes:
      <% project.volumes.each do |volume| %>
      - name: <%= volume.name %>
        persistentVolumeClaim:
          claimName: <%= volume.name %>
      <% end %>
      <% end %>
